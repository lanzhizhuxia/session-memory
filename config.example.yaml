# ============================================================
# session-memory config.yaml — 完整参考
# ============================================================

# --- 数据源配置 (§2.4.4) ---
sources:
  opencode:
    enabled: true
    db_path: "~/.local/share/opencode/opencode.db"

  claude_code:
    enabled: true
    base_dir: "~/.claude"

  # 未来扩展
  # cursor:
  #   enabled: false
  #   db_path: "~/Library/Application Support/Cursor/..."

# --- 来源标签 (§2.4.4) ---
source_labels:
  opencode: "OC"
  claude_code: "CC"

# --- 噪音过滤 (§3.2) ---
noise_filter:
  exclude_projects:
    - "some-ci-bot"
  include_projects: []
  noise_project_human_threshold: 5     # 用户消息数 > N 的 session 视为人类

# --- Layer 3 AI 提取 (§5.4.1) ---
layer3:
  # 常用开关
  enabled: true             # 设为 false 跳过 AI 提取
  min_score: 3              # 加权分数 ≥ 此值进入 AI 分析
  max_sessions: 500         # 单次运行上限（safety cap）
  batch_size: 30            # 每批并发 session 数（默认 30；单 session 提取阶段并发 3 个 prompt = 此阶段峰值约 90，不含 consolidation/polish）

  # 模型配置（注意：模型名需与代理实际暴露名称一致）
  # api_key: "sk-..."       # 或设置相应环境变量
  # api_base_url: "http://localhost:14265"   # LiteLLM proxy 或其他 OpenAI 兼容端点
  # model: "gpt-5.4-mini"                    # Layer 3 提取模型（默认 gpt-5.4-mini）
  # consolidation_model: "gpt-5.4"           # Layer 3 合并去重模型（默认 gpt-5.4；比提取用更强的模型提升合并质量）

  # 长上下文路由（高级调优）
  # long_context_model: "gemini-3.1-pro-preview"   # 超长输入时切换使用
  # long_context_threshold: 250000                 # 输入字符数超过此值时切换

  # Layer 4 输出润色（常用开关）
  # view_polish_enabled: true               # 是否对最终 view markdown 做 LLM 润色
  # view_polish_model: "gpt-5.4-mini"       # Layer 4 polish 模型

  # Layer 4 输出润色（高级调优）
  # view_polish_max_chars_per_call: 24000   # 单次 polish 输入字符上限；默认 24000
  # view_polish_cache_version: "v1"         # 缓存 key 不包含 prompt 内容；改 prompt 后 bump 此值强制重跑（默认 v1）

# --- 输出 ---
output_dir: "~/.local/share/session-memory"

# --- Memory 层配置 (PRD-memory-integration §6) ---
memory:
  enabled: true

  claude-code:
    auto_memory: true          # ~/.claude/projects/*/memory/ 下的 AI 自动记忆
    rules: true                # CLAUDE.md + .claude/rules/*.md
    session_memory: false      # ~/.claude/session-memory/ — Phase 3B
    subagent_memory: false     # .claude/agent-memory/ — Phase 3C
    # memory_dir: "~/.claude"  # 可覆盖 Claude Code 数据根目录

  opencode:
    agents_md: false           # AGENTS.md — Phase 3B

  source_labels:
    claude-code-memory: "CC-MEM"
    claude-code-rule: "CC-RULE"
    opencode-memory: "OC-MEM"
    opencode-rule: "OC-RULE"

# --- 项目路径别名 (§8.4, Phase 2+) ---
